[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
childlogdir=/var/log

[program:sshd]
command=/usr/sbin/sshd -D
autostart=true
autorestart=true
stdout_logfile=/var/log/sshd.out.log
stderr_logfile=/var/log/sshd.err.log

[program:gunicorn]
command=/bin/bash -c "cd /app && python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --timeout 120 --workers 4 --worker-class sync"
directory=/app
user=webuser
autostart=true
autorestart=true
stdout_logfile=/var/log/gunicorn.out.log
stderr_logfile=/var/log/gunicorn.err.log
environment=PYTHONUNBUFFERED="1"